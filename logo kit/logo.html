<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>

<title>SecondCortex - Logo Reveal</title>
<!-- Tailwind CSS v3 CDN -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<style data-purpose="brand-typography">
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap');
    body {
      font-family: 'Inter', sans-serif;
      background-color: #ffffff;
    }
  </style>
<style data-purpose="layout-optimizations">
    /* Ensuring the mobile viewport is handled correctly for high-fidelity presentation */
    .ios-safe-area {
      padding-top: env(safe-area-inset-top);
      padding-bottom: env(safe-area-inset-bottom);
    }
    
    /* Subtle fade-in for a premium feel */
    .fade-in {
      animation: fadeIn 1.2s cubic-bezier(0.4, 0, 0.2, 1);
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: scale(0.98); }
      to { opacity: 1; transform: scale(1); }
    }
  </style>
</head>
<body class="bg-white antialiased overflow-hidden">
<!-- BEGIN: MainContainer -->

<h1 class="sr-only">SecondCortex</h1>
</div>
<!-- END: LogoBlock -->
</main>
<!-- END: MainContainer -->
