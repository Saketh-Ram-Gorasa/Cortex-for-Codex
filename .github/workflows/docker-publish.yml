name: Build and Push Docker Images

on:
  push:
    branches: [ "main" ]

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE: ghcr.io/syed-suhaan/secondcortex-backend
  FRONTEND_IMAGE: ghcr.io/syed-suhaan/secondcortex-frontend
  IMAGE_TAG: ${{ github.sha }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Log in to the Container registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Backend image
        uses: docker/build-push-action@v6
        with:
          context: ./secondcortex-backend
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:latest
            ${{ env.BACKEND_IMAGE }}:${{ env.IMAGE_TAG }}

      - name: Build and push Frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./secondcortex-web
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:latest
            ${{ env.FRONTEND_IMAGE }}:${{ env.IMAGE_TAG }}
          build-args: |
            NEXT_PUBLIC_BACKEND_URL=https://sc-backend-suhaan.azurewebsites.net

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Deploy Backend to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: sc-backend-suhaan
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE_BACKEND }}
          images: ${{ env.BACKEND_IMAGE }}:${{ env.IMAGE_TAG }}

      - name: Deploy Frontend to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: sc-frontend-suhaan
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE_FRONTEND }}
          images: ${{ env.FRONTEND_IMAGE }}:${{ env.IMAGE_TAG }}

      - name: Backend health check
        shell: bash
        run: |
          set -euo pipefail
          for i in {1..12}; do
            code=$(curl -s -o /dev/null -w "%{http_code}" https://sc-backend-suhaan.azurewebsites.net/health || true)
            if [ "$code" = "200" ]; then
              echo "Backend health check passed"
              exit 0
            fi
            echo "Backend not ready yet (attempt $i/12, status=$code)"
            sleep 10
          done
          echo "Backend health check failed"
          exit 1

      - name: Frontend health check
        shell: bash
        run: |
          set -euo pipefail
          for i in {1..12}; do
            code=$(curl -s -o /dev/null -w "%{http_code}" https://sc-frontend-suhaan.azurewebsites.net/ || true)
            if [ "$code" = "200" ]; then
              echo "Frontend health check passed"
              exit 0
            fi
            echo "Frontend not ready yet (attempt $i/12, status=$code)"
            sleep 10
          done
          echo "Frontend health check failed"
          exit 1
