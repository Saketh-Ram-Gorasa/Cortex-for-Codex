name: Build Local Runtime ZIP

on:
  workflow_dispatch:
    inputs:
      upload_to_release:
        description: "Upload ZIP to a GitHub Release"
        type: boolean
        required: false
        default: false
      release_tag:
        description: "Release tag (required when upload_to_release=true), e.g. v0.1.0"
        type: string
        required: false
        default: ""

jobs:
  build-local-runtime-zip:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Build stable full local runtime ZIP
        working-directory: secondcortex-backend
        run: |
          python create_local_runtime_zip.py --include-wheelhouse

      - name: Resolve runtime ZIP path
        id: zip
        shell: bash
        run: |
          set -euo pipefail
          zip_path=$(ls -1 secondcortex-backend/dist/secondcortex-local-runtime-v*-full.zip | head -n 1)
          if [ -z "$zip_path" ]; then
            echo "No runtime ZIP found in secondcortex-backend/dist"
            exit 1
          fi
          echo "path=$zip_path" >> "$GITHUB_OUTPUT"
          echo "name=$(basename "$zip_path")" >> "$GITHUB_OUTPUT"

      - name: Upload runtime ZIP artifact
        uses: actions/upload-artifact@v4
        with:
          name: secondcortex-local-runtime-full
          path: ${{ steps.zip.outputs.path }}
          if-no-files-found: error

      - name: Validate release inputs
        if: ${{ inputs.upload_to_release }}
        shell: bash
        run: |
          if [ -z "${{ inputs.release_tag }}" ]; then
            echo "release_tag is required when upload_to_release=true"
            exit 1
          fi

      - name: Upload ZIP to release
        if: ${{ inputs.upload_to_release }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          gh release upload "${{ inputs.release_tag }}" "${{ steps.zip.outputs.path }}" --clobber
